<div class="tabs">
  <button class="tab" [class.active]="!local()" (click)="setLocal(false)">All</button>
  <button class="tab" [class.active]="local()" (click)="setLocal(true)">Local</button>
  <button class="btn btn-outline live-toggle" [class.active]="live()" (click)="toggleLive()">
    {{ live() ? '● Live' : 'Go live' }}
  </button>
</div>

@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (!statuses().length) {
  <p class="muted center">No public statuses yet.</p>
} @else {
  @for (s of statuses(); track s.id; let i = $index) {
    <app-status-card [status]="s" (changed)="onChanged(i, $event)" (deleted)="onDeleted($event)" />
  }
}
