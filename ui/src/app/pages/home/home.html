<app-announcements />
<app-compose (posted)="onPosted($event)" />

<app-command-bar [live]="live()" (toggleLive)="toggleLive()" />

@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (!statuses().length) {
  <p class="muted center">Your home timeline is empty. Follow someone, or post something.</p>
} @else {
  @for (s of statuses(); track s.id; let i = $index) {
    <app-status-card
      [status]="s"
      (changed)="onChanged(i, $event)"
      (deleted)="onDeleted($event)"
      (replied)="onPosted($event)"
    />
  }
  <button class="btn btn-outline more" (click)="loadMore()">Load more</button>
}
