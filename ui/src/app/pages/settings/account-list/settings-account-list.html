<div class="spage-head">
  <h1>{{ title }}</h1>
  <p>{{ subtitle }}</p>
</div>

@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (!accounts().length) {
  <p class="muted center">Nothing here.</p>
} @else {
  <ul class="account-list">
    @for (a of accounts(); track a.id) {
      <li class="account-row">
        <a class="account-link" [routerLink]="['/accounts', a.id]">
          <img class="avatar" [src]="a.avatar" [alt]="a.username" />
          <span class="names">
            <span class="name">{{ a.display_name || a.username }}</span>
            <span class="acct muted">&#64;{{ a.acct }}</span>
          </span>
        </a>
        <button class="btn btn-outline btn-sm" (click)="undo(a)">
          {{ kind() === 'mutes' ? 'Unmute' : 'Unblock' }}
        </button>
      </li>
    }
  </ul>
}
