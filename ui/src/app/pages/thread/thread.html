@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (status(); as s) {
  @for (a of ancestors(); track a.id) {
    <app-status-card [status]="a" (changed)="onContextChanged($event)" (deleted)="onContextDeleted($event)" (replied)="onReply($event)" />
  }
  <app-status-card [status]="s" (changed)="onChanged($event)" (deleted)="onFocusedDeleted()" (replied)="onReply($event)" />
  <app-compose [inReplyToId]="s.id" placeholder="Post your reply" (posted)="onReply($event)" />
  @for (d of descendants(); track d.id) {
    <app-status-card [status]="d" (changed)="onContextChanged($event)" (deleted)="onContextDeleted($event)" (replied)="onReply($event)" />
  }
} @else {
  <p class="muted center">Status not found.</p>
}
