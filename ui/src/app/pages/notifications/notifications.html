<div class="live-toggle">
  <button class="btn btn-outline" [class.active]="live()" (click)="toggleLive()">
    {{ live() ? '● Live' : 'Go live' }}
  </button>
</div>

@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (!items().length) {
  <p class="muted center">No notifications yet.</p>
} @else {
  @for (n of items(); track n.id) {
    <div class="notif">
      <a [routerLink]="['/accounts', n.account.id]">
        <img class="notif-avatar" [src]="n.account.avatar" [alt]="n.account.username" />
      </a>
      <div class="notif-body">
        <a class="who" [routerLink]="['/accounts', n.account.id]">{{
          n.account.display_name || n.account.username
        }}</a>
        <span class="what muted">{{ label(n.type) }}</span>
        @if (n.status) {
          <a
            class="excerpt"
            [routerLink]="['/statuses', n.status.id]"
            [innerHTML]="n.status.content"
          ></a>
          @if (n.type === 'mention') {
            <div class="mention-reply">
              <app-compose [inReplyToId]="n.status.id" placeholder="Post your reply" />
            </div>
          }
        }
      </div>
    </div>
  }
}
