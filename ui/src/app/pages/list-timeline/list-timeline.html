<div class="page-head">{{ title() || 'List' }}</div>

@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (!statuses().length) {
  <p class="muted center">No statuses in this list yet.</p>
} @else {
  @for (s of statuses(); track s.id; let i = $index) {
    <app-status-card [status]="s" (changed)="onChanged(i, $event)" />
  }
}
