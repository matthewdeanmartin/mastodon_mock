@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (!statuses().length) {
  <p class="muted center">You haven't bookmarked anything yet.</p>
} @else {
  @for (s of statuses(); track s.id; let i = $index) {
    <app-status-card [status]="s" (changed)="onChanged(i, $event)" (deleted)="onDeleted($event)" />
  }
}
