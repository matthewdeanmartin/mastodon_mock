<div class="page-head tag-head">
  <span>#{{ tag() }}</span>
  @if (tagInfo(); as info) {
    <span class="tag-actions">
      <!-- Both act as toggles: filled (accent) when on, outline when off. -->
      <button class="btn btn-sm" [class.btn-outline]="!info.following" (click)="toggleFollow()">
        {{ info.following ? 'Following' : 'Follow' }}
      </button>
      <button class="btn btn-sm" [class.btn-outline]="!info.featuring" (click)="toggleFeature()">
        {{ info.featuring ? 'Featured' : 'Feature' }}
      </button>
    </span>
  }
</div>

@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (!statuses().length) {
  <p class="muted center">No statuses tagged #{{ tag() }}.</p>
} @else {
  @for (s of statuses(); track s.id; let i = $index) {
    <app-status-card
      [status]="s"
      filterContext="public"
      (changed)="onChanged(i, $event)"
      (deleted)="onDeleted($event)"
    />
  }
}
