<div class="overlay" (click)="closed.emit()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <h3>Report &#64;{{ username() }}</h3>
    @if (statusId()) {
      <p class="muted small">Reporting a specific post.</p>
    }
    <p class="muted small">
      Please review this carefully. Reports cannot be undone after they are sent.
    </p>

    <label class="field">
      Category
      <select [ngModel]="category()" (ngModelChange)="category.set($event)">
        @for (c of categories; track c) {
          <option [value]="c">{{ c }}</option>
        }
      </select>
    </label>

    <label class="field">
      Comment (optional)
      <textarea
        rows="3"
        [ngModel]="comment()"
        (ngModelChange)="comment.set($event)"
        placeholder="What's wrong?"
      ></textarea>
    </label>

    <div class="dialog-actions">
      <button class="btn btn-outline" (click)="closed.emit()">Cancel</button>
      <button class="btn warn" [disabled]="submitting()" (click)="submit()">
        {{ submitting() ? 'Sending…' : 'Confirm report' }}
      </button>
    </div>
  </div>
</div>
