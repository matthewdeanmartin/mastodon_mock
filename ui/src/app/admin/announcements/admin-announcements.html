<div class="new-announcement">
  <textarea
    rows="3"
    [ngModel]="newText()"
    (ngModelChange)="newText.set($event)"
    placeholder="Announcement text (HTML allowed)"
  ></textarea>
  <div class="new-actions">
    <label class="publish-toggle">
      <input type="checkbox" [ngModel]="publishNow()" (ngModelChange)="publishNow.set($event)" />
      Publish immediately
    </label>
    <button class="btn" [disabled]="!newText().trim() || submitting()" (click)="create()">Create</button>
  </div>
</div>

@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (!announcements().length) {
  <p class="muted center">No announcements.</p>
} @else {
  @for (a of announcements(); track a.id) {
    <div class="announcement-row" [class.draft]="!a.published">
      <div class="ann-body">
        <span class="badge" [class.published]="a.published">{{ a.published ? 'Published' : 'Draft' }}</span>
        <div class="ann-content" [innerHTML]="a.content"></div>
        @if (a.reactions.length) {
          <div class="ann-reactions muted small">
            @for (r of a.reactions; track r.name) {
              <span>{{ r.name }} {{ r.count }}</span>
            }
          </div>
        }
      </div>
      <div class="ann-ops">
        <button class="op" (click)="togglePublished(a)">{{ a.published ? 'Unpublish' : 'Publish' }}</button>
        <button class="op warn" (click)="remove(a)">Delete</button>
      </div>
    </div>
  }
}
