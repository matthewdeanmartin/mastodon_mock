<p class="muted small intro">
  Server statistics over the last 30 days (the mock returns zero-valued measures).
</p>

@if (loading()) {
  <p class="muted center">Loading…</p>
} @else if (!measures().length) {
  <p class="muted center">No measures.</p>
} @else {
  @for (m of measures(); track m.key) {
    <div class="block-row">
      <span>{{ m.key }}</span>
      <strong>{{ m.human_value }}</strong>
    </div>
  }
}
