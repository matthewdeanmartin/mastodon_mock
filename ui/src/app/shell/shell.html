<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" routerLink="/home" aria-label="mastodon_mock home">
      <span class="brand-mark" aria-hidden="true">m</span>
      <span class="brand-name">mastodon_mock</span>
    </a>

    <nav class="primary-nav" aria-label="Primary navigation">
      <a routerLink="/home" routerLinkActive="active">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5.5v-6h-5v6H4a1 1 0 0 1-1-1z" />
        </svg>
        <span>Home</span>
      </a>
      <a routerLink="/public" routerLinkActive="active">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="M3.5 9h17M3.5 15h17M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18" />
        </svg>
        <span>Public</span>
      </a>
      <a routerLink="/notifications" routerLinkActive="active">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M9.5 21h5" />
        </svg>
        <span>Notifications</span>
      </a>
      <a routerLink="/conversations" routerLinkActive="active">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 5h16v12H8l-4 4z" />
        </svg>
        <span>Messages</span>
      </a>
      <a routerLink="/search" routerLinkActive="active">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="6.5" />
          <path d="m15.5 15.5 5 5" />
        </svg>
        <span>Search</span>
      </a>
    </nav>

    <div class="header-actions">
      <details class="more-menu">
        <summary aria-label="More navigation">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="5" cy="12" r="1.5" />
            <circle cx="12" cy="12" r="1.5" />
            <circle cx="19" cy="12" r="1.5" />
          </svg>
          <span>More</span>
        </summary>
        <div class="menu-panel">
          <a routerLink="/favourites">Favourites</a>
          <a routerLink="/bookmarks">Bookmarks</a>
          <a routerLink="/lists">Lists</a>
          <a routerLink="/tags">Tags</a>
          <a routerLink="/about">About</a>
          <div class="menu-divider"></div>
          <a routerLink="/settings">Settings</a>
          <a routerLink="/dev/faults">Faults</a>
          <a href="/docs" target="_blank" rel="noopener">API Docs ↗</a>
          @if (isStaff()) {
            <a routerLink="/admin" class="admin-link">Admin</a>
          }
        </div>
      </details>

      @if (auth.account(); as acc) {
        <a class="account-pill" [routerLink]="['/accounts', acc.id]" [attr.aria-label]="'View profile for ' + acc.display_name">
          <img [src]="acc.avatar_static || acc.avatar" alt="" />
          <span>{{ acc.display_name }}</span>
        </a>
      }
      <button class="logout-button" type="button" (click)="logout()">Log out</button>
    </div>
  </div>
</header>

<main class="column">
  <router-outlet />
</main>
