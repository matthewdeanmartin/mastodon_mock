<div
  class="overlay"
  role="presentation"
  tabindex="-1"
  (click)="closed.emit()"
  (keyup.escape)="closed.emit()"
>
  <div
    class="dialog"
    role="dialog"
    aria-labelledby="bug-title"
    (click)="$event.stopPropagation()"
    (keyup)="$event.stopPropagation()"
  >
    <h3 id="bug-title">Report a bug</h3>
    <p class="muted intro">
      This builds a report you can file or paste yourself. Nothing is sent automatically — you'll
      review it, then either copy it or open a prefilled GitHub issue.
    </p>

    <label class="field-label" for="bug-desc">What happened?</label>
    <textarea
      id="bug-desc"
      rows="4"
      placeholder="What were you doing, and what went wrong?"
      [ngModel]="description()"
      (ngModelChange)="description.set($event)"
    ></textarea>

    @if (hasErrors()) {
      <label class="check">
        <input
          type="checkbox"
          [ngModel]="includeErrors()"
          (ngModelChange)="includeErrors.set($event)"
        />
        Include the {{ errorLog.entries().length }} most recent error(s) captured in this tab
      </label>
    }

    <button class="link-btn" type="button" (click)="showDetails.set(!showDetails())">
      {{ showDetails() ? 'Hide' : 'Show' }} exactly what will be included
    </button>
    @if (showDetails()) {
      <pre class="preview">{{ preview() }}</pre>
    }

    <div class="actions">
      <button class="btn btn-outline" type="button" (click)="closed.emit()">Close</button>
      <button class="btn btn-outline" type="button" (click)="copy()">
        {{ copied() ? 'Copied ✓' : 'Copy report' }}
      </button>
      <button class="btn" type="button" (click)="openGithub()">Open GitHub issue</button>
    </div>
  </div>
</div>
