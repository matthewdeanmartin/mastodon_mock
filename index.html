    <!--
      SPA deep-link restore. GitHub Pages' single root 404.html
      (404-subpath-redirect.html) bounces an unknown deep link to the owning
      app's index with the original path stashed as ?spa=…; here we restore it
      into history before Angular's router reads location, so refreshing or
      chunk-reloading a deep URL lands back on that same route (and on the right
      deployment — /canary/… stays under /canary/). Runs synchronously ahead of
      the app bundle.
    -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var target = params.get('spa');
        // Same-origin absolute path only: leading "/" but not "//" (which would
        // be a protocol-relative cross-origin URL).
        if (target && target.charAt(0) === '/' && target.charAt(1) !== '/') {
          history.replaceState(null, '', target);
        }
      })();
    </script>

    <!--
      GoatCounter analytics. no_onload disables its built-in auto-count and
      hashchange listener; this is a path-based Angular SPA, so page views are
      counted on router NavigationEnd instead (see analytics-tracker.ts).
    -->
    <script>
      window.goatcounter = { no_onload: true };
    </script>
