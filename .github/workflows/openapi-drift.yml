---
# Phase 5 of spec/openapi_support.md — automated OpenAPI drift detection.
#
# The upstream Mastodon schema lives in the *vendored, untracked* `mastodon-openapi/`
# tool, which CI does not have. This job clones it fresh, runs the spec-vs-spec
# comparison + the Phase 2 contract tests, and (on the weekly schedule) opens a PR when
# the regenerated upstream schema introduces drift the allow-list doesn't yet cover.
#
# On pull_request / push it runs as a plain check (no PR creation): un-allow-listed drift
# fails the build, exactly like running `make compare-openapi` + `pytest
# tests/test_openapi_contract.py` locally.
name: OpenAPI drift
on:
  pull_request:
    paths:
      - mastodon_mock/**
      - tests/openapi/**
      - tests/test_openapi_contract.py
      - .github/workflows/openapi-drift.yml
  push:
    branches: [main]
  schedule:
    # Weekly, after mastodon-openapi's own Sunday 08:00 UTC regeneration.
    - cron: 0 10 * * 0
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  drift:
    name: Compare mock OpenAPI vs upstream
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
      # The upstream schema generator is a separate, untracked checkout. Vendor it fresh
      # so the comparison runs against the current upstream contract. Pinned to a tag
      # would be more reproducible; main gives us "latest upstream" for drift alerting.
      - name: Vendor upstream Mastodon OpenAPI schema
        run: |
          git clone --depth 1 https://github.com/abraham/mastodon-openapi.git mastodon-openapi
      - name: Sync dependencies
        run: uv sync --extra test
      - name: Generate drift report
        run: uv run mastodon_mock compare-openapi --format markdown --out openapi_compare_report.generated.md
      - name: Show drift summary
        run: uv run mastodon_mock compare-openapi --format text
      - name: Enforce contract (fails on un-allow-listed drift)
        run: uv run pytest tests/test_openapi_contract.py -q
      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: openapi-drift-report
          path: openapi_compare_report.generated.md
          if-no-files-found: warn
