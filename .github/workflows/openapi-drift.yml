---
# Phase 5 of spec/openapi_support.md — automated OpenAPI drift detection.
#
# The upstream Mastodon schema lives in the *vendored, untracked* `mastodon-openapi/`
# tool, which CI does not have. This job clones it fresh, runs the spec-vs-spec
# comparison + the Phase 2 contract tests, and (on the weekly schedule) opens a PR when
# the regenerated upstream schema introduces drift the allow-list doesn't yet cover.
#
# On pull_request / push it runs as a plain check (no PR creation): un-allow-listed drift
# fails the build, exactly like running `make compare-openapi` + `pytest
# tests/test_openapi_contract.py` locally.
name: OpenAPI drift
on:
  pull_request:
    paths:
      - mastodon_mock/**
      - tests/openapi/**
      - tests/test_openapi_contract.py
      - .github/workflows/openapi-drift.yml
  push:
    branches: [main]
  schedule:
    # Weekly, after mastodon-openapi's own Sunday 08:00 UTC regeneration.
    - cron: 0 10 * * 0
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  drift:
    name: Compare mock OpenAPI vs upstream
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
      # The upstream schema generator is a separate repo. The repo now vendors a snapshot
      # at mastodon-openapi/dist/schema.json (committed), so we can't clone on top of it.
      # Clone fresh into a temp dir and overwrite the vendored copy, so this drift check
      # always compares against current upstream rather than the committed snapshot. Pinned
      # to a tag would be more reproducible; main gives us "latest upstream" for alerting.
      - name: Vendor upstream Mastodon OpenAPI schema
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/abraham/mastodon-openapi.git /tmp/upstream-openapi
          mkdir -p mastodon-openapi/dist
          cp /tmp/upstream-openapi/dist/schema.json mastodon-openapi/dist/schema.json
      - name: Sync dependencies
        run: uv sync --extra test
      - name: Generate drift report
        run: uv run mastodon_mock compare-openapi --format markdown --out openapi_compare_report.generated.md
      - name: Show drift summary
        run: uv run mastodon_mock compare-openapi --format text
      - name: Enforce contract (fails on un-allow-listed drift)
        run: uv run pytest tests/test_openapi_contract.py -q
      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: openapi-drift-report
          path: openapi_compare_report.generated.md
          if-no-files-found: warn
  # Strict response-shape conformance ratchet (spec/fable/roadmap.md 1.3). Runs
  # against the *committed* schema snapshot (not fresh upstream) so it only fails
  # on mock regressions, never on upstream churn — the drift job above owns that.
  # Green as of Sprint 1; new failures mean a change broke a response shape and
  # must be fixed or explicitly quarantined with a reviewed reason.
  strict-fuzz:
    name: Strict OpenAPI fuzz (ratchet)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - name: Sync dependencies (contract extra)
        run: uv sync --extra contract
      - name: Run strict schema-conformance fuzz
        env:
          CONTRACT_STRICT: '1'
          HYPOTHESIS_MAX_EXAMPLES: '1'
        run: uv run pytest -m contract tests/test_openapi_fuzz.py -q
