---
name: Mocking Bird (GitHub Pages)
# Build and deploy the standalone "Mocking Bird" static Mastodon web client to GitHub
# Pages. This is the mock-server UI rebuilt with all mock tooling compiled out
# (see ui/src/environments/environment.mockingbird.ts and spec/publish.md, Track 1).
on:
  push:
    branches: [main]
    paths: [ui/**, .github/workflows/mockingbird-pages.yml]
  workflow_dispatch:
# Allow one concurrent deployment; let an in-progress run finish (don't cancel a deploy).
concurrency:
  group: pages
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build:
    name: Build Mocking Bird
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CUSTOM_DOMAIN: mawkingbird.com
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Build Mocking Bird
        # The custom domain serves the site from the origin root, not a repository
        # sub-path, so build the Angular app with a root base href.
        run: make mockingbird MOCKINGBIRD_BASE_HREF=/
      - name: Add SPA 404 fallback
        # GitHub Pages serves 404.html for unknown paths; mirroring index.html lets the
        # Angular router handle deep links (e.g. /accounts/123) on reload.
        run: cp ui/dist-mockingbird/browser/index.html ui/dist-mockingbird/browser/404.html
      - name: Add custom domain
        # Publish a CNAME alongside the artifact so Pages binds the deployment to the
        # production custom domain.
        run: printf '%s' "$CUSTOM_DOMAIN" > ui/dist-mockingbird/browser/CNAME
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: ui/dist-mockingbird/browser
  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
