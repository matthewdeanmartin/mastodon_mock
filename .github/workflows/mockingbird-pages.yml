---
name: Deploy Mawkingbird production
# Manually promote a commit to the production GitHub Pages site at mawkingbird.com.
#
# Production and canary share ONE Pages site, served from this repo's gh-pages
# branch:
#   /         -> production (this workflow, run on demand)
#   /canary/  -> canary     (mockingbird-canary.yml, every main commit)
#
# This workflow rewrites the branch root but preserves the /canary/ subtree, so
# promoting prod never clobbers canary.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish (branch, tag, or commit SHA)
        required: true
        default: main
        type: string
# Share the gh-pages writer lock with canary so the two never race; let an
# in-progress deploy finish rather than cancelling it.
concurrency:
  group: gh-pages-branch
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  build:
    name: Build and deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CUSTOM_DOMAIN: mawkingbird.com
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Stamp build info
        # Bake the build date, commit, and this run's URL into the footer
        # (overwrites the checked-in placeholder ui/src/app/build-info.ts).
        run: node ui/scripts/gen-build-info.mjs
      - name: Build Mocking Bird
        # The custom domain serves the site from the origin root, not a sub-path,
        # so build the Angular app with a root base href.
        run: make mockingbird MOCKINGBIRD_BASE_HREF=/
      - name: Add SPA 404 fallback
        # GitHub Pages serves 404.html for unknown paths; mirroring index.html lets the
        # Angular router handle deep links (e.g. /accounts/123) on reload.
        run: cp ui/dist-mockingbird/browser/index.html ui/dist-mockingbird/browser/404.html
      - name: Add custom domain
        # The CNAME lives at the site root and binds the whole Pages site
        # (production AND /canary/) to the production custom domain.
        run: printf '%s' "$CUSTOM_DOMAIN" > ui/dist-mockingbird/browser/CNAME
      - name: Publish production to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-gh-pages.sh root ui/dist-mockingbird/browser
