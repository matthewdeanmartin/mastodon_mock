---
name: Deploy Mawkingbird Canary
# Publish every main-branch commit to the /canary/ subpath of this repo's own
# GitHub Pages site: https://mawkingbird.com/canary/.
#
# The published site lives on the gh-pages branch of THIS repository:
#   /         -> production (updated manually by mockingbird-pages.yml)
#   /canary/  -> canary     (updated by this workflow on every commit)
#
# Each workflow updates only its own subtree of gh-pages, so canary deploys
# never disturb production and vice versa. No cross-repo PAT is needed: the
# built-in GITHUB_TOKEN can push to this repo.
on:
  push:
    branches: [main]

# Serialize gh-pages writers so canary and prod never race on the branch.
concurrency:
  group: gh-pages-branch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy Canary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Stamp build info
        run: node ui/scripts/gen-build-info.mjs
      - name: Build Canary
        # Served from the /canary/ sub-path, so build with a matching base href.
        run: make mockingbird MOCKINGBIRD_BASE_HREF=/canary/
      - name: Add SPA 404 fallback and canary marker
        run: |
          cp ui/dist-mockingbird/browser/index.html ui/dist-mockingbird/browser/404.html
          printf '%s\n' "$GITHUB_SHA" > ui/dist-mockingbird/browser/canary-commit.txt
      - name: Publish /canary/ to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-gh-pages.sh canary ui/dist-mockingbird/browser
