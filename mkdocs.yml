---
site_name: mastodon_mock
site_url: https://mastodon_mock.readthedocs.io/
site_author: Matthew Martin <matthewdeanmartin@gmail.com>
site_description: Stateful in-memory/SQLite mock of the Mastodon REST API for testing
  Mastodon clients
repo_url: https://github.com/matthewdeanmartin/mastodon_mock
theme:
  name: readthedocs
  features: [navigation.footer]
edit_uri: edit/main/docs/
markdown_extensions:
  - attr_list
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Overview:
      - Readme.md: overview/README.md
      - How It Works: overview/how-it-works.md
  - Installation: installation.md
  - Usage:
      - Quick Start: usage/quickstart.md
      - HTTPS and Real Mastodon Clients: usage/https-and-real-clients.md
      - Writing Tests: usage/writing-tests.md
      - Data Generation: usage/data-generation.md
      - Admin UI and API: usage/admin-ui.md
  - Reference:
      - What Is and Isn't Mocked: reference/coverage.md
  - Troubleshooting: troubleshooting.md
  - Contributing:
      - Guide: extending/CONTRIBUTING.md
      - Performance Design: performance_design.md
  - Change Log: CHANGELOG.md
validation:
  nav:
    omitted_files: warn
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
